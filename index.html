<script>
function calc(){

let N = Number(document.getElementById('new').value);
let R = Number(document.getElementById('resale').value);
let t = Number(document.getElementById('years').value);
let g = Number(document.getElementById('growth').value)/100;
let i = Number(document.getElementById('interest').value)/100;
let loan = Number(document.getElementById('loan').value)/100;
let rent = Number(document.getElementById('rent').value)*12;

let newFuture = N * Math.pow(1+g,t);
let resaleFuture = R * Math.pow(1+g,t);

let newGain = newFuture - N;
let resaleGain = resaleFuture - R;

let newInterest = N*loan*i*t*0.7;
let resaleInterest = R*loan*i*t;

let rental = rent * t;

let newTotal = newGain - newInterest;
let resaleTotal = resaleGain - resaleInterest + rental;

let diff = resaleTotal - newTotal;

let winner = diff > 0 ? "RESALE" : "NEW";

document.getElementById('result').innerHTML = `
<h3>📊 Investment Report</h3>

<b>Summary:</b><br>
${winner} outperforms by $${Math.abs(Math.round(diff))}<br><br>

<b>📈 Capital Growth</b><br>
New Gain: $${Math.round(newGain)}<br>
Resale Gain: $${Math.round(resaleGain)}<br><br>

<b>💸 Interest Cost</b><br>
New: $${Math.round(newInterest)}<br>
Resale: $${Math.round(resaleInterest)}<br><br>

<b>💰 Rental Income</b><br>
Total Rental: $${Math.round(rental)}<br><br>

<b>📊 Net Profit</b><br>
New: $${Math.round(newTotal)}<br>
Resale: $${Math.round(resaleTotal)}<br><br>

<b>🧠 Key Insight</b><br>
${winner === "RESALE" ? 
"Resale benefits from immediate rental and lower entry price." :
"New benefits from lower early costs and progressive payment."
}

`;
}
</script>
