<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Calculator</title>
<style>
body { font-family: Arial; padding:20px; background:#f5f7fb; }
.card { background:white; padding:20px; border-radius:12px; max-width:500px; margin:auto; }
input { width:100%; padding:10px; margin:5px 0; }
button { padding:12px; width:100%; background:#2563eb; color:white; border:none; }
.result { margin-top:20px; font-weight:bold; font-size:18px; }
</style>
</head>

<body>

<div class="card">

<h2>Property Decision Calculator</h2>

<input id="new" placeholder="New price"><br>
<input id="resale" placeholder="Resale price"><br>
<input id="years" value="10"><br>
<input id="growth" value="3"><br>

<button onclick="calc()">Calculate</button>

<div id="result" class="result"></div>

</div>

<script>
function calc(){
let N = Number(document.getElementById('new').value);
let R = Number(document.getElementById('resale').value);
let t = Number(document.getElementById('years').value);
let g = Number(document.getElementById('growth').value)/100;

let newVal = N*Math.pow(1+g,t);
let resaleVal = R*Math.pow(1+g,t);

let newGain = newVal - N;
let resaleGain = resaleVal - R;

let winner = newGain > resaleGain ? "NEW WINS" : "RESALE WINS";

document.getElementById('result').innerHTML =
"New Gain: $" + Math.round(newGain) + "<br>" +
"Resale Gain: $" + Math.round(resaleGain) + "<br><br>" +
"👉 " + winner;
}
</script>

</body>
</html>
