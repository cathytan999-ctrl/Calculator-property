<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Calculator V8.1</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#eef3f9; padding:20px; }
.container { max-width:1000px; margin:auto; }
.card { background:#fff; padding:20px; border-radius:15px; margin-bottom:15px; }
input, select { width:100%; padding:10px; margin-bottom:10px; }
button { width:100%; padding:14px; background:#2563eb; color:#fff; border:none; border-radius:10px; }
h2 { margin-top:0; }
table { width:100%; border-collapse:collapse; }
td, th { padding:8px; border-bottom:1px solid #ddd; text-align:right; }
td:first-child, th:first-child { text-align:left; }
.bold { font-weight:bold; }
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>Inputs</h2>

<h4>General</h4>
<input id="years" value="10" placeholder="Years">
<input id="loanPct" value="75" placeholder="Loan %">
<input id="interest" value="2" placeholder="Interest %">
<input id="loanTenure" value="30" placeholder="Loan tenure (years)">
<input id="extraReturn" value="5" placeholder="Extra cash return %">

<h4>New</h4>
<input id="newPrice" value="2500000" placeholder="Price">
<input id="newGrowth" value="2.5" placeholder="Growth %">
<input id="newRent" value="7500" placeholder="Monthly rent (for AV)">
<select id="newType">
<option value="owner">Owner</option>
<option value="invest">Investment</option>
</select>
<input id="newMcst" value="350" placeholder="MCST">
<input id="newLoanRemain" value="1600000" placeholder="Loan remaining">
<input id="newAgent" value="2" placeholder="Agent fee %">

<h4>Resale</h4>
<input id="resalePrice" value="2000000">
<input id="resaleGrowth" value="3.5">
<input id="resaleRent" value="7500">
<select id="resaleType">
<option value="invest">Investment</option>
<option value="owner">Owner</option>
</select>
<input id="resaleMcst" value="500">
<input id="resaleLoanRemain" value="1200000">
<input id="resaleAgent" value="2">
<input id="reno" value="30000" placeholder="Renovation">

<button onclick="calc()">Calculate</button>
</div>

<div class="card">
<h2>Result</h2>

<table>
<tr><th></th><th>New</th><th>Resale</th></tr>
<tr><td>Future Value</td><td id="nFV"></td><td id="rFV"></td></tr>
<tr><td>Profit</td><td id="nProfit"></td><td id="rProfit"></td></tr>
<tr><td>Holding Cost</td><td id="nCost"></td><td id="rCost"></td></tr>
<tr><td>Rental</td><td id="nRentT"></td><td id="rRentT"></td></tr>
<tr><td>Extra Cash</td><td>-</td><td id="extra"></td></tr>
<tr class="bold"><td>Final Cash</td><td id="nFinal"></td><td id="rFinal"></td></tr>
<tr><td>ROI</td><td id="nROI"></td><td id="rROI"></td></tr>
</table>

<canvas id="chart"></canvas>

</div>

</div>

<script>
function v(id){ return Number(document.getElementById(id).value); }
function s(id){ return document.getElementById(id).value; }
function money(x){ return "$"+Math.round(x).toLocaleString(); }
function pct(x){ return (x*100).toFixed(1)+"%"; }

/* BSD */
function bsd(price){
let duty=0;
let bands=[[180000,0.01],[180000,0.02],[640000,0.03],[500000,0.04],[1500000,0.05],[999999999,0.06]];
for(let b of bands){
let use=Math.min(price,b[0]);
duty+=use*b[1];
price-=use;
if(price<=0) break;
}
return duty;
}

/* Property Tax */
function tax(av,type){
let t=0;
if(type==="owner"){
let bands=[[12000,0],[28000,0.04],[10000,0.06],[25000,0.10],[999999,0.14]];
for(let b of bands){
let use=Math.min(av,b[0]);
t+=use*b[1];
av-=use;
if(av<=0) break;
}
}else{
let bands=[[30000,0.12],[15000,0.20],[999999,0.28]];
for(let b of bands){
let use=Math.min(av,b[0]);
t+=use*b[1];
av-=use;
if(av<=0) break;
}
}
return t;
}

/* Principal Paid */
function principal(loan,rate,years,tenure){
let r=rate/12;
let n=tenure*12;
let p=loan*r/(1-Math.pow(1+r,-n));
let balance=loan;
let paid=0;

for(let i=0;i<years*12;i++){
let interest=balance*r;
let principal=p-interest;
balance-=principal;
paid+=principal;
}
return paid;
}

function calc(){

let years=v("years");
let loanPct=v("loanPct")/100;
let rate=v("interest")/100;
let tenure=v("loanTenure");
let extraReturn=v("extraReturn")/100;

/* NEW */
let nPrice=v("newPrice");
let nGrowth=v("newGrowth")/100;
let nRent=v("newRent")*12;
let nType=s("newType");
let nLoan=nPrice*loanPct;

let nFV=nPrice*Math.pow(1+nGrowth,years);
let nPrincipal=principal(nLoan,rate,years,tenure);
let nInterest=nLoan*rate*years;
let nTax=tax(nRent,nType)*years;
let nMcst=v("newMcst")*12*years;
let nBSD=bsd(nPrice);
let nAgent=nFV*(v("newAgent")/100);

let nCost=nInterest+nTax+nMcst+nBSD+nAgent;
let nFinal=nFV-v("newLoanRemain")-nCost;

/* RESALE */
let rPrice=v("resalePrice");
let rGrowth=v("resaleGrowth")/100;
let rRent=v("resaleRent")*12;
let rType=s("resaleType");
let rLoan=rPrice*loanPct;

let rFV=rPrice*Math.pow(1+rGrowth,years);
let rPrincipal=principal(rLoan,rate,years,tenure);
let rInterest=rLoan*rate*years;
let rTax=tax(rRent,rType)*years;
let rMcst=v("resaleMcst")*12*years;
let rBSD=bsd(rPrice);
let rAgent=rFV*(v("resaleAgent")/100);

let extra=(nPrice-rPrice)*Math.pow(1+extraReturn,years)-(nPrice-rPrice);

let rCost=rInterest+rTax+rMcst+rBSD+rAgent+v("reno");
let rFinal=rFV-v("resaleLoanRemain")-rCost+extra;

/* OUTPUT */
document.getElementById("nFV").innerText=money(nFV);
document.getElementById("rFV").innerText=money(rFV);

document.getElementById("nCost").innerText=money(nCost);
document.getElementById("rCost").innerText=money(rCost);

document.getElementById("nFinal").innerText=money(nFinal);
document.getElementById("rFinal").innerText=money(rFinal);

document.getElementById("nRentT").innerText = nType==="invest"?money(nRent*years):"$0";
document.getElementById("rRentT").innerText = rType==="invest"?money(rRent*years):"$0";

document.getElementById("extra").innerText=money(extra);

let nProfit=nFinal-(nPrice*(1-loanPct)+nPrincipal+nCost);
let rProfit=rFinal-(rPrice*(1-loanPct)+rPrincipal+rCost);

document.getElementById("nProfit").innerText=money(nProfit);
document.getElementById("rProfit").innerText=money(rProfit);

document.getElementById("nROI").innerText=pct(nProfit/(nPrice*(1-loanPct)));
document.getElementById("rROI").innerText=pct(rProfit/(rPrice*(1-loanPct)));

/* CHART */
let labels=[],nData=[],rData=[];
for(let i=1;i<=years;i++){
labels.push("Y"+i);
nData.push(nPrice*Math.pow(1+nGrowth,i));
rData.push(rPrice*Math.pow(1+rGrowth,i));
}

new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:labels,datasets:[
{label:"New",data:nData},
{label:"Resale",data:rData}
]}
});
}

calc();
</script>

</body>
</html>
