<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Decision Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 20px;
      color: #111827;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 34px;
      margin-bottom: 8px;
    }
    .sub {
      color: #6b7280;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .full {
      grid-column: 1 / -1;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 18px;
      font-weight: 700;
      margin-top: 8px;
      cursor: pointer;
    }
    .report {
      margin-top: 28px;
      padding: 20px;
      background: #f9fafb;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
    }
    .winner {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .highlight {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 15px;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 8px;
      text-align: right;
    }
    th:first-child, td:first-child {
      text-align: left;
    }
    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-top: 24px;
      margin-bottom: 10px;
    }
    .note {
      margin-top: 14px;
      color: #374151;
      line-height: 1.5;
    }
    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .full {
        grid-column: auto;
      }
      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Property Decision Calculator</h1>
    <div class="sub">Full analysis report for new launch vs resale.</div>

    <div class="grid">
      <div>
        <label>Mode</label>
        <select id="mode">
          <option value="owner">Owner Occupied</option>
          <option value="invest">Investment</option>
        </select>
      </div>
      <div>
        <label>Holding Years</label>
        <input id="years" type="number" value="10" />
      </div>

      <div>
        <label>New Price</label>
        <input id="newPrice" type="number" value="2500000" />
      </div>
      <div>
        <label>Resale Price</label>
        <input id="resalePrice" type="number" value="2000000" />
      </div>

      <div>
        <label>Resale Renovation</label>
        <input id="reno" type="number" value="30000" />
      </div>
      <div>
        <label>Annual Growth %</label>
        <input id="growth" type="number" value="3" />
      </div>

      <div>
        <label>Interest Rate %</label>
        <input id="interest" type="number" value="2" />
      </div>
      <div>
        <label>Loan %</label>
        <input id="loan" type="number" value="75" />
      </div>

      <div>
        <label>Monthly Rent</label>
        <input id="rent" type="number" value="7500" />
      </div>
      <div>
        <label>Monthly MCST</label>
        <input id="mcst" type="number" value="400" />
      </div>

      <div>
        <label>Property Tax / Year</label>
        <input id="tax" type="number" value="3000" />
      </div>
      <div>
        <label>Build Years For New Launch</label>
        <input id="buildYears" type="number" value="4" />
      </div>

      <div class="full">
        <button onclick="calc()">Generate Report</button>
      </div>
    </div>

    <div id="report" class="report"></div>
  </div>

  <script>
    function money(n) {
      return "$" + Math.round(n).toLocaleString();
    }

    function calc() {
      const mode = document.getElementById("mode").value;
      const years = Number(document.getElementById("years").value);
      const newPrice = Number(document.getElementById("newPrice").value);
      const resalePrice = Number(document.getElementById("resalePrice").value);
      const reno = Number(document.getElementById("reno").value);
      const growth = Number(document.getElementById("growth").value) / 100;
      const interest = Number(document.getElementById("interest").value) / 100;
      const loanPct = Number(document.getElementById("loan").value) / 100;
      const rent = Number(document.getElementById("rent").value) * 12;
      const mcst = Number(document.getElementById("mcst").value) * 12;
      const tax = Number(document.getElementById("tax").value);
      const buildYears = Number(document.getElementById("buildYears").value);

      const newFuture = newPrice * Math.pow(1 + growth, years);
      const resaleFuture = resalePrice * Math.pow(1 + growth, years);

      const newCapitalGain = newFuture - newPrice;
      const resaleCapitalGain = resaleFuture - resalePrice;

      const newLoan = newPrice * loanPct;
      const resaleLoan = resalePrice * loanPct;

      const progressiveFactor = years <= 5 ? 0.5 : 0.7;
      const newInterest = newLoan * interest * years * progressiveFactor;
      const resaleInterest = resaleLoan * interest * years;

      let newRentNet = 0;
      let resaleRentNet = 0;
      let newMcst = 0;
      let resaleMcst = mcst * years;
      let newTax = tax * years;
      let resaleTax = tax * years;

      if (mode === "invest") {
        const newRentYears = Math.max(0, years - buildYears);
        newMcst = mcst * newRentYears;
        newRentNet = (rent * newRentYears) - newMcst - newTax;
        resaleRentNet = (rent * years) - resaleMcst - resaleTax - reno;
      } else {
        newMcst = mcst * Math.max(0, years - buildYears);
      }

      const newTotal = mode === "invest"
        ? newCapitalGain + newRentNet - newInterest
        : newCapitalGain - newInterest - newMcst - newTax;

      const resaleTotal = mode === "invest"
        ? resaleCapitalGain + resaleRentNet - resaleInterest
        : resaleCapitalGain - resaleInterest - resaleMcst - resaleTax - reno;

      const diff = Math.abs(newTotal - resaleTotal);
      const winner = newTotal > resaleTotal ? "NEW WINS" : "RESALE WINS";

      let why = "";
      if (mode === "owner") {
        why = newTotal > resaleTotal
          ? "New wins because progressive payment reduces early interest and holding costs."
          : "Resale wins because the lower entry price outweighs the timing benefit of the new launch.";
      } else {
        why = resaleTotal > newTotal
          ? "Resale wins because it earns rent immediately and starts compounding income from Day 1."
          : "New wins because the price gap is small enough for lower early costs to outweigh rental delay.";
      }

      document.getElementById("report").innerHTML = `
        <div class="winner">${winner}</div>

        <div class="highlight">
          <b>Executive Summary</b><br>
          ${winner.replace(" WINS", "")} is ahead by <b>${money(diff)}</b> over ${years} years.<br>
          Mode: <b>${mode === "owner" ? "Owner Occupied" : "Investment"}</b>
        </div>

        <div class="section-title">Profit Breakdown</div>
        <table>
          <tr>
            <th>Item</th>
            <th>New</th>
            <th>Resale</th>
          </tr>
          <tr>
            <td>Future Value</td>
            <td>${money(newFuture)}</td>
            <td>${money(resaleFuture)}</td>
          </tr>
          <tr>
            <td>Capital Gain</td>
            <td>${money(newCapitalGain)}</td>
            <td>${money(resaleCapitalGain)}</td>
          </tr>
          <tr>
            <td>Rental Net</td>
            <td>${money(newRentNet)}</td>
            <td>${money(resaleRentNet)}</td>
          </tr>
          <tr>
            <td>Interest Cost</td>
            <td>${money(-newInterest)}</td>
            <td>${money(-resaleInterest)}</td>
          </tr>
          <tr>
            <td>MCST</td>
            <td>${money(-newMcst)}</td>
            <td>${money(-resaleMcst)}</td>
          </tr>
          <tr>
            <td>Property Tax</td>
            <td>${money(-newTax)}</td>
            <td>${money(-resaleTax)}</td>
          </tr>
          <tr>
            <td>Renovation</td>
            <td>${money(0)}</td>
            <td>${money(-reno)}</td>
          </tr>
          <tr>
            <td><b>Net Profit</b></td>
            <td><b>${money(newTotal)}</b></td>
            <td><b>${money(resaleTotal)}</b></td>
          </tr>
        </table>

        <div class="section-title">Key Insight</div>
        <div class="note">${why}</div>

        <div class="section-title">Final Recommendation</div>
        <div class="note">
          ${mode === "owner"
            ? "For own stay, short holding periods often favor new launch because of cost timing."
            : "For investment, resale often becomes stronger if rental starts immediately and the price gap is meaningful."}
        </div>
      `;
    }

    calc();
  </script>
</body>
</html>
