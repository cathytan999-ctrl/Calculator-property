<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef3f9;padding:20px}
.container{max-width:1000px;margin:auto}
.card{background:#fff;padding:20px;border-radius:15px;margin-bottom:15px}
h2{margin-top:0}
label{font-size:12px;color:#666}
input,select{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ccc}
button{width:100%;padding:14px;background:#2563eb;color:#fff;border:none;border-radius:10px}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #ddd;text-align:right}
td:first-child,th:first-child{text-align:left}
.bold{font-weight:bold}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>Inputs</h2>

<h4>General</h4>
<label>Holding Period (Years)</label>
<input id="years" value="10">

<label>Loan %</label>
<input id="loanPct" value="75">

<label>Interest %</label>
<input id="interest" value="2">

<label>Loan Tenure (Years)</label>
<input id="tenure" value="30">

<label>Extra Cash Return % (Resale)</label>
<input id="extraReturn" value="5">

<h4>New Property</h4>
<label>Purchase Price</label>
<input id="nPrice" value="2500000">

<label>Growth %</label>
<input id="nGrowth" value="2.5">

<label>Monthly Rent (for AV estimate)</label>
<input id="nRent" value="7500">

<label>Occupancy</label>
<select id="nType">
<option value="owner">Owner Occupied</option>
<option value="invest">Investment</option>
</select>

<label>MCST Monthly</label>
<input id="nMcst" value="350">

<label>Remaining Loan at Sale</label>
<input id="nLoanRemain" value="1600000">

<label>Agent Fee %</label>
<input id="nAgent" value="2">

<h4>Resale Property</h4>
<label>Purchase Price</label>
<input id="rPrice" value="2000000">

<label>Growth %</label>
<input id="rGrowth" value="3.5">

<label>Monthly Rent (for AV estimate)</label>
<input id="rRent" value="7500">

<label>Occupancy</label>
<select id="rType">
<option value="invest">Investment</option>
<option value="owner">Owner Occupied</option>
</select>

<label>MCST Monthly</label>
<input id="rMcst" value="500">

<label>Remaining Loan at Sale</label>
<input id="rLoanRemain" value="1200000">

<label>Agent Fee %</label>
<input id="rAgent" value="2">

<label>Renovation Cost</label>
<input id="reno" value="30000">

<button onclick="calc()">Generate Report</button>
</div>

<div class="card">
<h2>Detailed Report</h2>

<table>
<tr><th>Item</th><th>New</th><th>Resale</th></tr>

<tr><td>Future Value</td><td id="nFV"></td><td id="rFV"></td></tr>
<tr><td>Capital Gain</td><td id="nGain"></td><td id="rGain"></td></tr>

<tr class="bold"><td>Total Profit</td><td id="nProfit"></td><td id="rProfit"></td></tr>

<tr><td>Interest Cost</td><td id="nInterest"></td><td id="rInterest"></td></tr>
<tr><td>MCST</td><td id="nMcstT"></td><td id="rMcstT"></td></tr>
<tr><td>Property Tax</td><td id="nTax"></td><td id="rTax"></td></tr>
<tr><td>Stamp Duty (BSD)</td><td id="nBSD"></td><td id="rBSD"></td></tr>
<tr><td>Agent Fee</td><td id="nAgentT"></td><td id="rAgentT"></td></tr>
<tr><td>Renovation</td><td>$0</td><td id="renoT"></td></tr>

<tr class="bold"><td>Total Holding Cost</td><td id="nCost"></td><td id="rCost"></td></tr>

<tr><td>Total Rental</td><td id="nRentT"></td><td id="rRentT"></td></tr>
<tr><td>Extra Cash Gain</td><td>-</td><td id="extra"></td></tr>

<tr><td>Principal Paid</td><td id="nPrincipal"></td><td id="rPrincipal"></td></tr>

<tr class="bold"><td>Final Cash on Hand</td><td id="nFinal"></td><td id="rFinal"></td></tr>

<tr><td>ROI</td><td id="nROI"></td><td id="rROI"></td></tr>
</table>

<canvas id="chart"></canvas>

</div>

</div>

<script>
function v(id){return Number(document.getElementById(id).value)}
function s(id){return document.getElementById(id).value}
function money(x){return "$"+Math.round(x).toLocaleString()}
function pct(x){return (x*100).toFixed(1)+"%"}

/* BSD */
function bsd(p){
let d=0;
let b=[[180000,0.01],[180000,0.02],[640000,0.03],[500000,0.04],[1500000,0.05],[99999999,0.06]];
for(let i of b){
let use=Math.min(p,i[0]);
d+=use*i[1];
p-=use;
if(p<=0)break;
}
return d;
}

/* Property Tax */
function tax(av,type){
let t=0;
if(type=="owner"){
let b=[[12000,0],[28000,0.04],[10000,0.06],[25000,0.10],[999999,0.14]];
for(let i of b){
let use=Math.min(av,i[0]);
t+=use*i[1];
av-=use;
if(av<=0)break;
}
}else{
let b=[[30000,0.12],[15000,0.20],[999999,0.28]];
for(let i of b){
let use=Math.min(av,i[0]);
t+=use*i[1];
av-=use;
if(av<=0)break;
}
}
return t;
}

/* Principal */
function principal(loan,rate,years,tenure){
let r=rate/12;
let n=tenure*12;
let p=loan*r/(1-Math.pow(1+r,-n));
let bal=loan;
let paid=0;

for(let i=0;i<years*12;i++){
let interest=bal*r;
let pr=p-interest;
bal-=pr;
paid+=pr;
}
return paid;
}

function calc(){

let years=v("years");
let loanPct=v("loanPct")/100;
let rate=v("interest")/100;
let tenure=v("tenure");
let extraReturn=v("extraReturn")/100;

/* NEW */
let nPrice=v("nPrice");
let nGrowth=v("nGrowth")/100;
let nRent=v("nRent")*12;
let nType=s("nType");

let nFV=nPrice*Math.pow(1+nGrowth,years);
let nLoan=nPrice*loanPct;

let nPrincipal=principal(nLoan,rate,years,tenure);
let nInterest=nLoan*rate*years;

let nTax=tax(nRent,nType)*years;
let nMcst=v("nMcst")*12*years;
let nBSD=bsd(nPrice);
let nAgent=nFV*(v("nAgent")/100);

let nCost=nInterest+nTax+nMcst+nBSD+nAgent;
let nFinal=nFV-v("nLoanRemain")-nCost;

/* RESALE */
let rPrice=v("rPrice");
let rGrowth=v("rGrowth")/100;
let rRent=v("rRent")*12;
let rType=s("rType");

let rFV=rPrice*Math.pow(1+rGrowth,years);
let rLoan=rPrice*loanPct;

let rPrincipal=principal(rLoan,rate,years,tenure);
let rInterest=rLoan*rate*years;

let rTax=tax(rRent,rType)*years;
let rMcst=v("rMcst")*12*years;
let rBSD=bsd(rPrice);
let rAgent=rFV*(v("rAgent")/100);

let extra=(nPrice-rPrice)*Math.pow(1+extraReturn,years)-(nPrice-rPrice);

let rCost=rInterest+rTax+rMcst+rBSD+rAgent+v("reno");
let rFinal=rFV-v("rLoanRemain")-rCost+extra;

/* PROFIT */
let nProfit=nFinal-(nPrice*(1-loanPct)+nPrincipal+nCost);
let rProfit=rFinal-(rPrice*(1-loanPct)+rPrincipal+rCost);

/* OUTPUT */
document.getElementById("nFV").innerText=money(nFV);
document.getElementById("rFV").innerText=money(rFV);
document.getElementById("nGain").innerText=money(nFV-nPrice);
document.getElementById("rGain").innerText=money(rFV-rPrice);

document.getElementById("nInterest").innerText=money(nInterest);
document.getElementById("rInterest").innerText=money(rInterest);

document.getElementById("nMcstT").innerText=money(nMcst);
document.getElementById("rMcstT").innerText=money(rMcst);

document.getElementById("nTax").innerText=money(nTax);
document.getElementById("rTax").innerText=money(rTax);

document.getElementById("nBSD").innerText=money(nBSD);
document.getElementById("rBSD").innerText=money(rBSD);

document.getElementById("nAgentT").innerText=money(nAgent);
document.getElementById("rAgentT").innerText=money(rAgent);

document.getElementById("renoT").innerText=money(v("reno"));

document.getElementById("nCost").innerText=money(nCost);
document.getElementById("rCost").innerText=money(rCost);

document.getElementById("nRentT").innerText=nType=="invest"?money(nRent*years):"$0";
document.getElementById("rRentT").innerText=rType=="invest"?money(rRent*years):"$0";

document.getElementById("extra").innerText=money(extra);

document.getElementById("nPrincipal").innerText=money(nPrincipal);
document.getElementById("rPrincipal").innerText=money(rPrincipal);

document.getElementById("nFinal").innerText=money(nFinal);
document.getElementById("rFinal").innerText=money(rFinal);

document.getElementById("nProfit").innerText=money(nProfit);
document.getElementById("rProfit").innerText=money(rProfit);

document.getElementById("nROI").innerText=pct(nProfit/(nPrice*(1-loanPct)));
document.getElementById("rROI").innerText=pct(rProfit/(rPrice*(1-loanPct)));

/* Chart */
let labels=[],nData=[],rData=[];
for(let i=1;i<=years;i++){
labels.push("Y"+i);
nData.push(nPrice*Math.pow(1+nGrowth,i));
rData.push(rPrice*Math.pow(1+rGrowth,i));
}

new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:labels,datasets:[
{label:"New",data:nData},
{label:"Resale",data:rData}
]}
});
}

calc();
</script>

</body>
</html>
